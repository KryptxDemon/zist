<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZIST - Your Learning Compass</title>
    <meta
      name="description"
      content="ZIST - Your personal learning compass for organizing and tracking educational content"
    />
    <meta name="author" content="ZIST" />

    <meta property="og:title" content="ZIST - Your Learning Compass" />
    <meta
      property="og:description"
      content="Your personal learning compass for organizing and tracking educational content"
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Prevent flash of unstyled content by setting theme class before page renders -->
    <script>
      (function () {
        const theme = localStorage.getItem("zist-theme");
        if (
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="../src/others/main.tsx"></script>
  </body>
</html>
