services:
  backend:
    build:
      context: ./zist-backend
      dockerfile: Dockerfile
    env_file:
      - ./zist-backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./zist-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
